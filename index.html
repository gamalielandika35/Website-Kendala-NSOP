<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Laporan Kendala</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="logo.jpg" />

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="index.css">

</head>

<body>

  <!-- Form Container -->
  <div class="container form-container">
    <img src="logo.jpg" alt="Logo" class="logo">
    <img src="image/logo1.png" alt="Logo" class="logo1">
    <h1 class="form-title">LAPORAN KENDALA</h1>
    <form id="laporanForm">
      <input type="hidden" id="submissionId" name="submissionId" readonly>
      <input type="hidden" id="timestamp" name="timestamp" readonly>

      <div class="mb-3">
        <label for="nama" class="form-label">Nama Lengkap</label>
        <input type="text" class="form-control" id="nama" name="nama" required>
      </div>

      <div class="mb-3">
        <label for="nim" class="form-label">NIM</label>
        <input type="text" class="form-control" id="nim" name="nim" required>
      </div>

      <div class="mb-3">
        <label for="kelompok" class="form-label">Kelompok</label>
        <input type="text" class="form-control" id="kelompok" name="kelompok" required>
      </div>

      <div class="mb-3">
        <label for="jenis" class="form-label">Jenis Kendala</label> <br>
        <input type="checkbox" id="email" name="jenis" value="email">
        <label for="jenis" class="form-label">E-Mail</label> <br>
        <input type="checkbox" id="classroom" name="jenis" value="google classroom" >
        <label for="jenis" class="form-label">Google Classroom</label> <br>
        <input type="checkbox" id="myithb" name="jenis" value="myITHB">
        <label for="jenis" class="form-label">MyITHB</label> <br>
        <input type="checkbox" id="lainnya" name="jenis" value="kendala lainnya" >
        <label for="jenis" class="form-label">Kendala Lainnya</label>
      </div>

      <div class="mb-3">
        <label for="penjelasan" class="form-label">Penjelasan Kendala</label>
        <textarea class="form-control" id="penjelasan" name="penjelasan" rows="4" required></textarea>
      </div>

      <div class="mb-3">
        <label for="screenshot1" class="form-label">
          Upload Screenshot 1 (Wajib)
        </label>
        <input type="file" class="form-control" id="screenshot1" accept="image/*" required>
      </div>

      <div class="mb-3">
        <label for="screenshot2" class="form-label">
          Upload Screenshot 2
        </label>
        <input type="file" class="form-control" id="screenshot2" accept="image/*" >
      </div>

      <div class="mb-3">
        <label for="screenshot3" class="form-label">
          Upload Screenshot 3 (Opsional)
        </label>
        <input type="file" class="form-control" id="screenshot3" accept="image/*">
      </div>

      <button type="submit" class="btn btn-primary w-100">
        🚀 Kirim Laporan
      </button>
    </form>
  </div>

  <!-- Spinner Loading -->
  <div id="spinnerOverlay" class="spinner-overlay">
    <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <!-- Modal Alert -->
  <div class="modal fade" id="statusModal" tabindex="-1" aria-labelledby="statusModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="statusModalLabel">Status</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
        </div>
        <div class="modal-body" id="modalMessage">
          <!-- Message will be inserted here -->
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const submissionId = Math.floor(10000 + Math.random() * 90000);
      document.getElementById("submissionId").value = submissionId;
      document.getElementById("timestamp").value = new Date().toISOString();

      const form = document.getElementById("laporanForm");
      const spinner = document.getElementById("spinnerOverlay");
      const modal = new bootstrap.Modal(document.getElementById("statusModal"));
      const modalMessage = document.getElementById("modalMessage");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        spinner.style.display = "flex";

        const file1 = document.getElementById("screenshot1").files[0];
        const file2 = document.getElementById("screenshot2").files[0];
        const file3 = document.getElementById("screenshot3").files[0];

        const base641 = file1 ? await toBase64(file1) : "";
        const base642 = file2 ? await toBase64(file2) : "";
        const base643 = file3 ? await toBase64(file3) : "";

        const fileName1 = file1 ? file1.name : "";
        const fileName2 = file2 ? file2.name : "";
        const fileName3 = file3 ? file3.name : "";

        const selectedJenis = Array.from(document.querySelectorAll('input[name="jenis"]:checked')).map(el => el.value);

        const data = new URLSearchParams();
        data.append("submissionId", document.getElementById("submissionId").value);
        data.append("nama", document.getElementById("nama").value);
        data.append("nim", document.getElementById("nim").value);
        data.append("kelompok", document.getElementById("kelompok").value);
        data.append("jenis", selectedJenis.join(", "));
        data.append("penjelasan", document.getElementById("penjelasan").value);
        data.append("fileBase641", base641);
        data.append("fileName1", fileName1);

        data.append("fileBase642", base642);
        data.append("fileName2", fileName2);

        data.append("fileBase643", base643);
        data.append("fileName3", fileName3);

        try {
          const response = await fetch(
            "https://script.google.com/macros/s/AKfycbws1ruYe2Sy7d5Gph8Xs_WtxZQm1bVMXtWB2sbehHRrWy2fXPndoWpB9-lhZtB2aoUI/exec",
            {
              method: "POST",
              headers: {
                "Content-Type":
                  "application/x-www-form-urlencoded"
              },
              body: data
            }
          );

          const result = await response.text();

          spinner.style.display = "none";

          console.log(result);

          if (result.trim() === "Berhasil") {
            modalMessage.textContent =
              "✅ Laporan berhasil dikirim!";
            form.reset();
          } else {
            modalMessage.textContent =
              "❌ " + result;
          }

          modal.show();

        } catch (error) {

          spinner.style.display = "none";

          modalMessage.textContent =
            "⚠️ Terjadi kesalahan: " + error.message;

          modal.show();
        }

        function toBase64(file) {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
              const base64String = reader.result.split(',')[1];
              resolve(base64String);
            };
            reader.onerror = error => reject(error);
          });
        }
      });
    });
  </script>

</body>

</html>
